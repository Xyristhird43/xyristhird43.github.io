<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="1" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="tri" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="16" y="16" width="992" height="992" rx="224" fill="url(#bg)"/>
  <rect x="16" y="16" width="992" height="992" rx="224" fill="none" stroke="#4ade80" stroke-opacity="0.35" stroke-width="12"/>
  <!-- launch triangle -->
  <g filter="url(#glow)">
    <path d="M512 208 L768 704 L616 704 L512 528 L408 704 L256 704 Z" fill="url(#tri)"/>
  </g>
  <!-- baseline dash = launchpad -->
  <rect x="336" y="768" width="352" height="44" rx="22" fill="#4ade80" opacity="0.9"/>
</svg>
